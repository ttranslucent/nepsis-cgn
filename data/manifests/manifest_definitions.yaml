families:
  puzzle:
    manifolds:
      - id: strict_set
        class: strict_set
        description: "Letter-for-letter manifold; hidden U required."
        governor:
          tension_warn: 1.0
          tension_ruin: 2.0
          velocity_shock: 4.0
      - id: phonetic_variant
        class: phonetic_variant
        description: "Phonetic manifold; I/J interchangeable; silent U allowed."
        governor:
          tension_warn: 1.0
          tension_ruin: 2.0
          velocity_shock: 5.0
  clinical:
    manifolds:
      - id: radicular_spasm
        class: radicular_spasm
        description: "Blue utility space for radicular pain with spasm; red flags remain boundary conditions."
        channel_space: utility
        channel_invariants:
          - "Optimize coherence and expected utility only while red boundaries are controlled."
          - "Preserve graded uncertainty until a discriminator supports closure."
        governor:
          tension_warn: 1.0
          tension_ruin: 2.0
          velocity_shock: 3.0
      - id: cauda_equina
        class: cauda_equina
        description: "Red ruin space for cauda equina; catastrophic miss is treated as a boundary, not a tradeoff."
        channel_space: ruin
        channel_invariants:
          - "Catastrophic miss is a boundary condition, not a utility term."
          - "Escalate or hold until explicit release back to the blue utility space."
          - "Severity constrains unsafe commitment; it does not establish hypothesis truth."
          - "RED applicability remains falsifiable and competing explanations remain visible."
        governor:
          tension_warn: 0.5
          tension_ruin: 1.5
          velocity_shock: 2.5
  safety:
    manifolds:
      - id: blue_channel
        class: blue_channel
        description: "Routine blue utility space for graded action under bounded risk."
        channel_space: utility
        channel_invariants:
          - "Optimize utility only while catastrophic boundaries remain controlled."
          - "Do not force closure when contradictions still need discrimination."
        governor:
          tension_warn: 1.0
          tension_ruin: 2.0
          velocity_shock: 4.0
      - id: red_channel
        class: red_channel
        description: "Red ruin space for critical signals; policy violation defines a boundary condition."
        channel_space: ruin
        channel_invariants:
          - "Policy-violation ruin is a boundary, not a utility penalty."
          - "Release back to blue requires explicit re-evaluation or reframe."
          - "Severity constrains unsafe commitment; it does not establish hypothesis truth."
          - "Use the least-burdensome reversible protection while gathering a discriminator."
        governor:
          tension_warn: 0.5
          tension_ruin: 1.0
          velocity_shock: 2.0

interpretants:
  - id: puzzle_strict
    description: "Letter-for-letter interpretation; hidden U is mandatory."
    manifold_id: strict_set
    prior: 0.55
  - id: puzzle_phonetic
    description: "Phonetic variant allows I/J swap and silent U."
    manifold_id: phonetic_variant
    prior: 0.45
    likelihood:
      keyword: phonetic
      boost: 1.5
  - id: clinical_radicular_spasm
    description: "Radicular pain with spasm, no red flags."
    manifold_id: radicular_spasm
    prior: 0.6
  - id: clinical_cauda_equina
    description: "Red-channel cauda equina manifold when red flags appear."
    manifold_id: cauda_equina
    prior: 0.2
    likelihood:
      keywords: ["saddle_anesthesia", "bladder_dysfunction", "bilateral_weakness"]
      boost: 8.0
      miss: 0.4
    catastrophic: true
  - id: safety_blue
    description: "Routine blue-channel handling; no critical signal expected."
    manifold_id: blue_channel
    prior: 0.6
  - id: safety_red
    description: "Red-channel handling for critical signals; escalates policy violations."
    manifold_id: red_channel
    prior: 0.4
    likelihood:
      keywords: ["critical_signal", "policy_violation"]
      boost: 2.0
      miss: 0.4
    catastrophic: true
