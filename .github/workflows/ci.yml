name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev,api]"

      - name: Run pytest
        run: python -m pytest -q

  web:
    name: Web lint, build, and auth regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nepsis-web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nepsis-web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run focused auth regression
        run: npm run test:e2e:auth -- --project=chrome-desktop -g "session status backfills CSRF cookie"
